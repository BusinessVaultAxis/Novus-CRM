<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber CRM — BeyondPro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0D0D0D;--s1:#141414;--s2:#1C1C1C;--s3:#242424;--b:#252525;--b2:#303030;--gold:#C9A84C;--text:#EFEFEF;--dim:#999;--muted:#555;--green:#5a9e6b;--blue:#4a8fc9;--red:#c05050;--radius:8px;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;min-height:100vh;display:flex;font-size:14px;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ── SIDEBAR ── */
#sidebar{width:255px;min-height:100vh;background:var(--s1);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;}
.sb-top{padding:20px 18px 16px;border-bottom:1px solid var(--b);}
.sb-brand{font-size:9px;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;font-weight:600;}
.sb-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.goal-block{padding:16px 18px;border-bottom:1px solid var(--b);}
.gl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.gl-title{font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:0.11em;font-weight:600;}
.gl-pct{font-size:11px;color:var(--muted);}
.gbar{height:3px;background:var(--b2);border-radius:2px;margin-bottom:9px;overflow:hidden;}
.gfill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s ease;}
.gnums{display:flex;justify-content:space-between;align-items:baseline;}
.g-earned{font-size:21px;font-weight:600;letter-spacing:-0.5px;}
.g-left{font-size:11px;color:var(--muted);}
.g-note{font-size:10px;color:var(--muted);margin-top:4px;}
.stat-grid{padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:7px;border-bottom:1px solid var(--b);}
.stat{background:var(--s2);border-radius:var(--radius);padding:10px 11px;}
.stat-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;}
.stat-val{font-size:19px;font-weight:600;line-height:1;}
.comm-block{padding:13px 18px;border-bottom:1px solid var(--b);}
.comm-row{display:flex;align-items:center;justify-content:space-between;}
.comm-lbl{font-size:12px;color:var(--dim);}
.comm-in{display:flex;align-items:center;gap:4px;}
.comm-in span{font-size:13px;color:var(--muted);}
.comm-in input{width:68px;padding:4px 8px;background:var(--bg);border:1px solid var(--b);border-radius:6px;color:var(--text);font-size:13px;text-align:right;}
.comm-in input:focus{outline:none;border-color:var(--b2);}
.sb-actions{padding:16px 18px;display:flex;flex-direction:column;gap:8px;margin-top:auto;border-top:1px solid var(--b);}
.btn{padding:9px 14px;border-radius:var(--radius);font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s;}
.btn-gold{background:transparent;border:1px solid var(--gold);color:var(--gold);}
.btn-gold:hover{background:rgba(201,168,76,.08);}
.btn-ghost{background:transparent;border:1px solid var(--b);color:var(--dim);}
.btn-ghost:hover{border-color:var(--b2);color:var(--text);}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn-danger:hover{background:rgba(192,80,80,.08);}
.btn-sm{padding:6px 11px;font-size:12px;}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.top-bar{height:3px;background:var(--b);}
.top-fill{height:100%;background:var(--gold);transition:width .5s ease;}
.tabs{display:flex;border-bottom:1px solid var(--b);background:var(--s1);padding:0 22px;}
.tab{padding:11px 16px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:13px;cursor:pointer;transition:color .15s;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--dim);}
.tab.active{border-bottom-color:var(--gold);color:var(--gold);}
#content{flex:1;padding:22px 26px;overflow-y:auto;}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:14px 16px;margin-bottom:9px;}
.lead-card{cursor:pointer;transition:border-color .15s;}
.lead-card:hover{border-color:var(--b2);}
.lead-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;}
.lead-name{font-size:14px;font-weight:500;}
.lead-addr{font-size:12px;color:var(--muted);margin-bottom:5px;}
.lead-meta{display:flex;gap:14px;font-size:11px;color:var(--muted);}
.badge{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:500;}
.b-Pitched{background:rgba(140,140,140,.12);color:#888;}
.b-Signed{background:rgba(90,158,107,.12);color:var(--green);}
.b-Scheduled{background:rgba(201,168,76,.12);color:var(--gold);}
.b-Installed{background:rgba(74,143,201,.12);color:var(--blue);}
.b-Cancelled{background:rgba(192,80,80,.12);color:var(--red);}
.b-Lost{background:rgba(192,80,80,.12);color:var(--red);}

/* ── SEARCH / FILTER ── */
.search-row{margin-bottom:11px;}
.search-row input{width:100%;padding:9px 13px;background:var(--s1);border:1px solid var(--b);border-radius:var(--radius);color:var(--text);font-size:13px;}
.search-row input:focus{outline:none;border-color:var(--b2);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.fbtn{padding:3px 10px;border-radius:5px;font-size:11px;cursor:pointer;background:transparent;border:1px solid var(--b);color:var(--muted);transition:all .15s;}
.fbtn:hover{border-color:var(--b2);}
.fbtn.fa{font-weight:500;}

/* ── DASHBOARD ── */
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.d-card{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:14px 16px;}
.d-lbl{font-size:11px;color:var(--muted);margin-bottom:4px;}
.d-val{font-size:21px;font-weight:600;line-height:1;}
.sec-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin:16px 0 8px;}
.up-row{display:flex;justify-content:space-between;align-items:center;}
.up-right{text-align:right;}
.up-date{font-size:12px;font-weight:500;}
.up-rel{font-size:10px;color:var(--muted);margin-top:1px;}
.up-name{font-size:13px;font-weight:500;}
.up-addr{font-size:11px;color:var(--muted);margin-top:1px;}
.empty-state{text-align:center;padding:48px 0;color:var(--muted);font-size:13px;line-height:1.7;}

/* ── MODAL ── */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.72);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#181818;border:1px solid var(--b);border-radius:13px;width:100%;max-width:490px;max-height:88vh;overflow-y:auto;padding:24px;}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.mtitle{font-size:15px;font-weight:500;}
.mclose{background:transparent;border:none;color:var(--muted);font-size:22px;line-height:1;padding:2px 4px;cursor:pointer;}
.mclose:hover{color:var(--text);}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--b);border-radius:7px;color:var(--text);font-size:13px;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--b2);}
.fg textarea{min-height:72px;resize:vertical;}
.fg select option{background:#181818;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.chk-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;color:var(--dim);cursor:pointer;}
.mbtns{display:flex;gap:8px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b);font-size:13px;}
.detail-row:last-child{border:none;}
.dk{color:var(--muted);}
.dv-gold{color:var(--gold);}
.detail-notes{background:var(--bg);border-radius:7px;padding:10px 12px;font-size:13px;color:var(--dim);line-height:1.55;margin:10px 0;white-space:pre-wrap;}
.fup-flag{font-size:12px;color:var(--gold);margin:8px 0 12px;display:flex;align-items:center;gap:5px;}
.err{font-size:12px;color:var(--red);margin-top:5px;}
.csv-ta{font-family:monospace;font-size:11px;min-height:110px;width:100%;padding:10px;background:var(--bg);border:1px solid var(--b);border-radius:7px;color:var(--dim);resize:vertical;}
.csv-ta:focus{outline:none;border-color:var(--b2);}
.prev-list{max-height:220px;overflow-y:auto;margin-bottom:12px;}
.prev-item{background:var(--s2);border-radius:7px;padding:9px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.prev-name{font-size:13px;font-weight:500;}
.prev-addr{font-size:11px;color:var(--muted);margin-top:1px;}
.import-hint{font-size:12px;color:var(--muted);margin-bottom:11px;line-height:1.6;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-top">
    <div class="sb-brand">Fiber CRM</div>
    <div class="sb-sub">BeyondPro Personal Tracker</div>
  </div>

  <div class="goal-block">
    <div class="gl">
      <span class="gl-title">$100k Goal</span>
      <span class="gl-pct" id="g-pct">0.0%</span>
    </div>
    <div class="gbar"><div class="gfill" id="g-fill" style="width:0%"></div></div>
    <div class="gnums">
      <span class="g-earned" id="g-earned">$0</span>
      <span class="g-left" id="g-left">$100,000 left</span>
    </div>
    <div class="g-note" id="g-note"></div>
  </div>

  <div class="stat-grid">
    <div class="stat"><div class="stat-lbl">Total leads</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-lbl">Pending</div><div class="stat-val" id="s-pending">0</div></div>
    <div class="stat"><div class="stat-lbl">Installed</div><div class="stat-val" id="s-installed">0</div></div>
    <div class="stat"><div class="stat-lbl">Follow-ups</div><div class="stat-val" id="s-followup">0</div></div>
  </div>

  <div class="comm-block">
    <div class="comm-row">
      <span class="comm-lbl">Commission / install</span>
      <div class="comm-in">
        <span>$</span>
        <input type="number" id="comm-input" min="0" value="150">
      </div>
    </div>
  </div>

  <div class="sb-actions">
    <button class="btn btn-ghost btn-sm" id="btn-import">↑ Import FastGem CSV</button>
    <button class="btn btn-gold" id="btn-add">+ Add Lead</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="top-bar"><div class="top-fill" id="top-fill" style="width:0%"></div></div>
  <div class="tabs">
    <button class="tab active" data-tab="dash">Dashboard</button>
    <button class="tab" data-tab="leads" id="tab-leads">Leads (0)</button>
  </div>
  <div id="content"></div>
</div>

<!-- MODALS -->
<div class="overlay" id="ov-add">
  <div class="modal">
    <div class="mhdr"><span class="mtitle" id="add-title">New Lead</span><button class="mclose" data-close="ov-add">×</button></div>
    <div class="fg"><label>Customer name</label><input id="f-name" placeholder="Full name"></div>
    <div class="fg"><label>Address</label><input id="f-addr" placeholder="Street address"></div>
    <div class="frow">
      <div class="fg"><label>Phone</label><input id="f-phone" type="tel" placeholder="Phone number"></div>
      <div class="fg"><label>Email</label><input id="f-email" type="email" placeholder="Email address"></div>
    </div>
    <div class="fg"><label>FastGem Contract ID</label><input id="f-cid" placeholder="Contract / ID #"></div>
    <div class="fg"><label>Status</label>
      <select id="f-status">
        <option>Pitched</option><option>Signed</option><option>Scheduled</option>
        <option>Installed</option><option>Cancelled</option><option>Lost</option>
      </select>
    </div>
    <div class="frow">
      <div class="fg"><label>Date signed</label><input id="f-signed" type="date"></div>
      <div class="fg"><label>Install date</label><input id="f-install" type="date"></div>
    </div>
    <div class="fg"><label>Notes</label><textarea id="f-notes" placeholder="Notes, follow-up details..."></textarea></div>
    <label class="chk-row"><input type="checkbox" id="f-followup"> Flag for follow-up</label>
    <div class="mbtns">
      <button class="btn btn-ghost" style="flex:1" data-close="ov-add">Cancel</button>
      <button class="btn btn-gold" style="flex:2" id="btn-save">Save Lead</button>
    </div>
  </div>
</div>

<div class="overlay" id="ov-detail">
  <div class="modal">
    <div class="mhdr"><span class="mtitle" id="d-name">—</span><button class="mclose" data-close="ov-detail">×</button></div>
    <div id="d-body"></div>
    <div class="mbtns" style="margin-top:16px">
      <button class="btn btn-danger btn-sm" id="btn-delete">Delete</button>
      <button class="btn btn-ghost" style="flex:1" data-close="ov-detail">Close</button>
      <button class="btn btn-gold" style="flex:2" id="btn-edit">Edit Lead</button>
    </div>
  </div>
</div>

<div class="overlay" id="ov-import">
  <div class="modal">
    <div class="mhdr"><span class="mtitle">Import from FastGem</span><button class="mclose" data-close="ov-import">×</button></div>
    <div id="import-body">
      <div class="import-hint">In FastGem go to <strong style="color:#ccc">Leads → Export</strong>, download the CSV file, then paste the full contents below.</div>
      <textarea class="csv-ta" id="csv-text" placeholder="Paste CSV contents here..."></textarea>
      <div class="err" id="csv-err" style="display:none"></div>
      <div class="mbtns" style="margin-top:12px">
        <button class="btn btn-ghost" style="flex:1" data-close="ov-import">Cancel</button>
        <button class="btn btn-gold" style="flex:2" id="btn-parse">Preview Import</button>
      </div>
    </div>
    <div id="import-preview" style="display:none">
      <div id="prev-count" style="font-size:13px;color:var(--dim);margin-bottom:10px;"></div>
      <div class="prev-list" id="prev-list"></div>
      <div class="mbtns">
        <button class="btn btn-ghost" style="flex:1" id="btn-back-csv">Back</button>
        <button class="btn btn-gold" style="flex:2" id="btn-do-import">Import Leads</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── STATE ──
const GOAL = 100000;
const STATUSES = ['Pitched','Signed','Scheduled','Installed','Cancelled','Lost'];
let leads = JSON.parse(localStorage.getItem('fcrm-leads') || '[]');
let settings = JSON.parse(localStorage.getItem('fcrm-settings') || '{"commission":150}');
let currentTab = 'dash';
let filterStatus = 'All';
let searchVal = '';
let editId = null;
let detailId = null;
let csvPreview = [];

const save = () => {
  localStorage.setItem('fcrm-leads', JSON.stringify(leads));
  localStorage.setItem('fcrm-settings', JSON.stringify(settings));
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const fmt = d => { if(!d) return '—'; const dt = new Date(d+'T12:00:00'); return isNaN(dt)?d:dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}); };
const daysFrom = d => { if(!d) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.round((new Date(d+'T12:00:00')-t)/864e5); };
const badge = s => `<span class="badge b-${s}">${s}</span>`;
const sc = { Pitched:'#888', Signed:'#5a9e6b', Scheduled:'#C9A84C', Installed:'#4a8fc9', Cancelled:'#c05050', Lost:'#c05050' };
const sbg = { Pitched:'rgba(140,140,140,.12)', Signed:'rgba(90,158,107,.12)', Scheduled:'rgba(201,168,76,.12)', Installed:'rgba(74,143,201,.12)', Cancelled:'rgba(192,80,80,.12)', Lost:'rgba(192,80,80,.12)' };

// ── SIDEBAR UPDATE ──
function updateSidebar() {
  const inst = leads.filter(l=>l.status==='Installed');
  const earned = inst.length * settings.commission;
  const pct = Math.min(100, earned/GOAL*100);
  const rem = Math.max(0, GOAL - earned);
  const need = rem > 0 ? Math.ceil(rem/settings.commission) : 0;
  const pending = leads.filter(l=>['Signed','Scheduled'].includes(l.status)).length;
  const fups = leads.filter(l=>l.followUp&&!['Installed','Cancelled','Lost'].includes(l.status)).length;

  document.getElementById('g-pct').textContent = pct.toFixed(1)+'%';
  document.getElementById('g-fill').style.width = pct+'%';
  document.getElementById('top-fill').style.width = pct+'%';
  document.getElementById('g-earned').textContent = '$'+earned.toLocaleString();
  document.getElementById('g-left').textContent = '$'+rem.toLocaleString()+' left';
  document.getElementById('g-note').textContent = need > 0 ? need+' more install'+(need!==1?'s':'')+' to goal' : earned>=GOAL?'🎯 Goal reached!':'';
  document.getElementById('s-total').textContent = leads.length;
  document.getElementById('s-pending').textContent = pending;
  document.getElementById('s-installed').textContent = inst.length;
  document.getElementById('s-followup').textContent = fups;
  document.getElementById('tab-leads').textContent = 'Leads ('+leads.length+')';
  document.getElementById('comm-input').value = settings.commission;
}

// ── DASHBOARD ──
function renderDash() {
  const inst = leads.filter(l=>l.status==='Installed');
  const earned = inst.length * settings.commission;
  const pct = Math.min(100, earned/GOAL*100);
  const upcoming = leads.filter(l=>l.installDate&&['Scheduled','Signed'].includes(l.status)).sort((a,b)=>new Date(a.installDate)-new Date(b.installDate)).slice(0,6);
  const fups = leads.filter(l=>l.followUp&&!['Installed','Cancelled','Lost'].includes(l.status));
  const signed = leads.filter(l=>l.status==='Signed').length;
  const scheduled = leads.filter(l=>l.status==='Scheduled').length;

  let html = `<div class="dash-row">
    <div class="d-card"><div class="d-lbl">Signed (awaiting schedule)</div><div class="d-val">${signed}</div></div>
    <div class="d-card"><div class="d-lbl">Scheduled installs</div><div class="d-val">${scheduled}</div></div>
    <div class="d-card"><div class="d-lbl">Completed installs</div><div class="d-val">${inst.length}</div></div>
    <div class="d-card"><div class="d-lbl">Est. total earned</div><div class="d-val">$${earned.toLocaleString()}</div></div>
  </div>`;

  if(upcoming.length) {
    html += `<div class="sec-lbl">Upcoming installs</div>`;
    upcoming.forEach(l => {
      const d = daysFrom(l.installDate);
      const dc = d===0?'var(--gold)':d<0?'var(--red)':'var(--text)';
      const rel = d===0?'Today':d===1?'Tomorrow':d<0?Math.abs(d)+'d overdue':'in '+d+'d';
      html += `<div class="card lead-card" data-id="${l.id}">
        <div class="up-row">
          <div><div class="up-name">${l.name||'Unknown'}</div><div class="up-addr">${(l.address||'').split(',')[0]}</div></div>
          <div class="up-right"><div class="up-date" style="color:${dc}">${fmt(l.installDate)}</div><div class="up-rel">${rel}</div></div>
        </div>
      </div>`;
    });
  }

  if(fups.length) {
    html += `<div class="sec-lbl">Needs follow-up</div>`;
    fups.slice(0,4).forEach(l => {
      html += `<div class="card lead-card" data-id="${l.id}">
        <div class="lead-top"><span class="lead-name">${l.name||'Unknown'}</span>${badge(l.status)}</div>
        <div class="lead-addr">${l.address||'—'}</div>
      </div>`;
    });
  }

  if(!leads.length) html += `<div class="empty-state">Add your first lead to start tracking<br>your path to $100k</div>`;
  document.getElementById('content').innerHTML = html;
}

// ── LEADS LIST ──
function renderLeads() {
  const filtered = leads.filter(l => {
    const ms = filterStatus==='All'||l.status===filterStatus;
    const q = searchVal.toLowerCase();
    const mq = !q || (l.name||'').toLowerCase().includes(q)||(l.address||'').toLowerCase().includes(q)||(l.phone||'').includes(q);
    return ms && mq;
  });

  const filterBtns = ['All',...STATUSES].map(s => {
    const active = filterStatus===s;
    const col = active ? (sc[s]||'var(--gold)') : 'var(--muted)';
    const bg = active ? (sbg[s]||'rgba(201,168,76,.12)') : 'transparent';
    const bc = active ? (sc[s]||'var(--gold)') : 'var(--b)';
    return `<button class="fbtn${active?' fa':''}" data-filter="${s}" style="color:${col};background:${bg};border-color:${bc}">${s}</button>`;
  }).join('');

  let html = `<div class="search-row"><input type="text" id="search-in" placeholder="Search name, address, phone..." value="${searchVal}"></div>
  <div class="filter-row">${filterBtns}</div>`;

  if(!filtered.length) html += `<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:13px;">No leads found</div>`;
  filtered.forEach(l => {
    html += `<div class="card lead-card" data-id="${l.id}">
      <div class="lead-top"><span class="lead-name">${l.name||'Unknown'}</span>${badge(l.status)}</div>
      <div class="lead-addr">${l.address||'—'}</div>
      <div class="lead-meta">
        ${l.phone?`<span>📞 ${l.phone}</span>`:''}
        ${l.installDate?`<span>🗓 Install: ${fmt(l.installDate)}</span>`:''}
        ${!l.installDate&&l.signedDate?`<span>Signed ${fmt(l.signedDate)}</span>`:''}
        ${l.followUp?`<span style="color:var(--gold)">⚑ Follow-up</span>`:''}
      </div>
    </div>`;
  });
  document.getElementById('content').innerHTML = html;

  document.getElementById('search-in')?.addEventListener('input', e => { searchVal=e.target.value; renderLeads(); });
}

function render() {
  updateSidebar();
  if(currentTab==='dash') renderDash();
  else renderLeads();
}

// ── DETAIL MODAL ──
function openDetail(id) {
  const l = leads.find(x=>x.id===id);
  if(!l) return;
  detailId = id;
  document.getElementById('d-name').textContent = l.name||'Unknown';
  const d = daysFrom(l.installDate);
  const dc = d!==null&&d<=0?'var(--gold)':'var(--text)';
  const rel = d===0?' · Today':d===1?' · Tomorrow':d!==null&&d>0?` · in ${d}d`:d!==null&&d<0?` · ${Math.abs(d)}d ago`:'';
  let rows = [
    ['Address', l.address],
    ['Phone', l.phone ? `<a href="tel:${l.phone}" class="dv-gold">${l.phone}</a>` : null],
    ['Email', l.email],
    ['FastGem ID', l.contractId ? `<span style="font-family:monospace;font-size:12px">${l.contractId}</span>` : null],
    ['Signed', l.signedDate ? fmt(l.signedDate) : null],
    ['Install date', l.installDate ? `<span style="color:${dc};font-weight:${d!==null&&d<=1?600:400}">${fmt(l.installDate)}${rel}</span>` : null],
    ['Status', badge(l.status)],
  ].filter(r=>r[1]);
  let html = `<div>${rows.map(([k,v])=>`<div class="detail-row"><span class="dk">${k}</span><span class="dv">${v}</span></div>`).join('')}</div>`;
  if(l.notes) html += `<div class="detail-notes">${l.notes}</div>`;
  if(l.followUp) html += `<div class="fup-flag">⚑ Flagged for follow-up</div>`;
  document.getElementById('d-body').innerHTML = html;
  document.getElementById('ov-detail').classList.add('open');
}

// ── ADD / EDIT MODAL ──
function openAdd(id=null) {
  editId = id;
  const l = id ? leads.find(x=>x.id===id) : null;
  document.getElementById('add-title').textContent = l ? 'Edit Lead' : 'New Lead';
  document.getElementById('f-name').value = l?.name||'';
  document.getElementById('f-addr').value = l?.address||'';
  document.getElementById('f-phone').value = l?.phone||'';
  document.getElementById('f-email').value = l?.email||'';
  document.getElementById('f-cid').value = l?.contractId||'';
  document.getElementById('f-status').value = l?.status||'Pitched';
  document.getElementById('f-signed').value = l?.signedDate||'';
  document.getElementById('f-install').value = l?.installDate||'';
  document.getElementById('f-notes').value = l?.notes||'';
  document.getElementById('f-followup').checked = l?.followUp||false;
  document.getElementById('ov-add').classList.add('open');
}

function saveLead() {
  const data = {
    name: document.getElementById('f-name').value.trim(),
    address: document.getElementById('f-addr').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    contractId: document.getElementById('f-cid').value.trim(),
    status: document.getElementById('f-status').value,
    signedDate: document.getElementById('f-signed').value,
    installDate: document.getElementById('f-install').value,
    notes: document.getElementById('f-notes').value.trim(),
    followUp: document.getElementById('f-followup').checked,
  };
  if(editId) {
    leads = leads.map(l => l.id===editId ? {...l,...data} : l);
  } else {
    leads.unshift({...data, id:uid(), createdAt:new Date().toISOString()});
  }
  save(); render();
  document.getElementById('ov-add').classList.remove('open');
  editId = null;
}

// ── CSV IMPORT ──
function parseCSV() {
  const raw = document.getElementById('csv-text').value.trim();
  document.getElementById('csv-err').style.display = 'none';
  if(!raw) { showErr('Paste your CSV content first'); return; }
  const lines = raw.split('\n').filter(l=>l.trim());
  if(lines.length<2) { showErr('Need a header row + at least one lead'); return; }
  const hdrs = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
  const ci = keys => { for(const k of keys){ const i=hdrs.findIndex(h=>h.includes(k)); if(i>=0)return i; } return -1; };
  const ni=ci(['name','customer','first name']), ai=ci(['address','street']), pi=ci(['phone','mobile','cell']),
        ei=ci(['email']), sti=ci(['status','stage']), ii=ci(['install']), sdi=ci(['signed','contract date','created','sale date']), nti=ci(['note','comment']);
  const rows = lines.slice(1).map(line => {
    const cols=[]; let cur='', inQ=false;
    for(const ch of line+','){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=ch;}
    const g=i=>i>=0?(cols[i]||'').trim().replace(/^"|"$/g,''):'';
    const rs = g(sti).toLowerCase();
    let status = 'Pitched';
    if(rs.includes('complet')||(rs.includes('install')&&rs.includes('done'))) status='Installed';
    else if(rs.includes('install')||rs.includes('schedul')) status='Scheduled';
    else if(rs.includes('sign')||rs.includes('active')||rs.includes('contract')) status='Signed';
    else if(rs.includes('cancel')) status='Cancelled';
    else if(rs.includes('lost')||rs.includes('decline')||rs.includes('no sale')) status='Lost';
    return {name:g(ni),address:g(ai),phone:g(pi),email:g(ei),status,installDate:g(ii),signedDate:g(sdi),notes:g(nti),followUp:false,contractId:''};
  }).filter(r=>r.name||r.address||r.phone);
  if(!rows.length) { showErr('No valid rows found — check your CSV format'); return; }
  csvPreview = rows;
  document.getElementById('prev-count').innerHTML = `Found <strong style="color:var(--text)">${rows.length}</strong> leads to import`;
  const pl = rows.slice(0,8).map(r=>`<div class="prev-item"><div><div class="prev-name">${r.name||'—'}</div><div class="prev-addr">${r.address||'—'}</div></div>${badge(r.status)}</div>`).join('');
  document.getElementById('prev-list').innerHTML = pl + (rows.length>8?`<div style="font-size:11px;color:var(--muted);text-align:center;padding:6px">+${rows.length-8} more</div>`:'');
  document.getElementById('import-body').style.display = 'none';
  document.getElementById('import-preview').style.display = 'block';
}
function showErr(msg) { const e=document.getElementById('csv-err'); e.textContent=msg; e.style.display='block'; }
function doImport() {
  const imported = csvPreview.map(r=>({...r,id:uid(),createdAt:new Date().toISOString()}));
  leads = [...imported, ...leads];
  save(); render();
  document.getElementById('ov-import').classList.remove('open');
  document.getElementById('csv-text').value='';
  document.getElementById('import-body').style.display='block';
  document.getElementById('import-preview').style.display='none';
  csvPreview=[];
}

// ── EVENT DELEGATION ──
document.addEventListener('click', e => {
  // Tab switch
  if(e.target.classList.contains('tab')) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    e.target.classList.add('active');
    currentTab = e.target.dataset.tab;
    render(); return;
  }
  // Lead card
  if(e.target.closest('.lead-card')) { openDetail(e.target.closest('.lead-card').dataset.id); return; }
  // Filter buttons
  if(e.target.classList.contains('fbtn')) { filterStatus=e.target.dataset.filter; renderLeads(); return; }
  // Close modal
  if(e.target.dataset.close) { document.getElementById(e.target.dataset.close).classList.remove('open'); return; }
  if(e.target.classList.contains('overlay')) { e.target.classList.remove('open'); return; }
  // Buttons
  const id = e.target.id;
  if(id==='btn-add') { openAdd(); return; }
  if(id==='btn-import') { document.getElementById('ov-import').classList.add('open'); return; }
  if(id==='btn-save') { saveLead(); return; }
  if(id==='btn-edit') { document.getElementById('ov-detail').classList.remove('open'); openAdd(detailId); return; }
  if(id==='btn-delete') { if(confirm('Delete this lead?')){ leads=leads.filter(l=>l.id!==detailId); save(); render(); document.getElementById('ov-detail').classList.remove('open'); } return; }
  if(id==='btn-parse') { parseCSV(); return; }
  if(id==='btn-back-csv') { document.getElementById('import-body').style.display='block'; document.getElementById('import-preview').style.display='none'; return; }
  if(id==='btn-do-import') { doImport(); return; }
});

// Commission input
document.getElementById('comm-input').addEventListener('change', e => {
  settings.commission = Math.max(0, +e.target.value);
  save(); updateSidebar();
});

// Keyboard close
document.addEventListener('keydown', e => {
  if(e.key==='Escape') document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));
});

// Boot
render();
</script>
</body>
</html>
